<html>
	<head>
		<title>Draoicht Studios</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
	</head>
	<body class="is-preload">
		<!-- Header -->
			<header id="header">
				<h1>Draoicht Studios</h1>
				<p>An independent game developer based in Wicklow, Ireland.<br />
				Coming soon...</p>
			</header>

		<!-- Signup Form -->
			<!--
				FORMSPREE SETUP — 3 easy steps:
				1. Go to https://formspree.io and create a free account
				2. Create a new form — Formspree will give you a URL like:
				   https://formspree.io/f/YOUR_FORM_ID
				3. Replace "YOUR_FORM_ID" in the action below with your actual ID
			-->
			<form id="signup-form" method="post" action="https://formspree.io/f/xojkejgb">
				<input type="email" name="email" id="email" placeholder="Email Address" required />

				<!-- Honeypot field: hidden from humans, catches bots -->
				<input type="text" name="_gotcha" style="display:none" />

				<!-- After submission, send users back to your site -->
				<input type="hidden" name="_next" value="https://draoicht.ie/?thanks=true" />

				<input type="submit" value="Sign Up" />
			</form>

			<!-- Thank-you message (shown after redirect back) -->
			<div id="thanks-message" style="display:none; color: white; margin-top: 1em;">
				🎮 You're on the list — we'll be in touch!
			</div>

		<!-- Footer -->
			<footer id="footer">
				<ul class="icons">
					<li><a href="#" class="icon brands fa-twitter"><span class="label">Twitter</span></a></li>
					<li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
					<li><a href="#" class="icon brands fa-github"><span class="label">GitHub</span></a></li>
					<li><a href="#" class="icon fa-envelope"><span class="label">Email</span></a></li>
				</ul>
				<ul class="copyright">
					<li>&copy; Draoicht Studios.</li><li>Credits: <a href="http://html5up.net">HTML5 UP</a></li>
				</ul>
			</footer>

		<!-- Scripts -->
			<script src="assets/js/main.js"></script>

			<!-- Show thank-you message if redirected back after signup -->
			<script>
				if (window.location.search.includes('thanks=true')) {
					document.getElementById('thanks-message').style.display = 'block';
					document.getElementById('signup-form').style.display = 'none';
				}
			</script>
	</body>
</html>
