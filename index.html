<html>
	<head>
		<title>Draoicht Studios</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			/* Icons 20% larger */
			#footer .icons a {
				font-size: 1.2em;
			}
			/* Bluesky SVG icon sizing to match */
			.icon-bluesky svg {
				width: 1.2em;
				height: 1.2em;
				fill: currentColor;
				vertical-align: middle;
			}
		</style>
	</head>
	<body class="is-preload">
		<!-- Header -->
			<header id="header">
				<h1>Draoicht Studios</h1>
				<p>An independent game developer based in Wicklow, Ireland.<br />
				Coming soon...</p>
			</header>

		<!-- Signup Form -->
			<form id="signup-form">
				<input type="email" name="email" id="email" placeholder="Email Address" required />
				<!-- Honeypot field: hidden from humans, catches bots -->
				<input type="text" name="_gotcha" style="display:none" />
				<input type="submit" value="Sign Up" />
			</form>

			<!-- Thank-you message (shown after successful AJAX submission) -->
			<div id="thanks-message" style="display:none; color: white; margin-top: 1em;">
				🎮 You're on the list — we'll be in touch!
			</div>

		<!-- Footer -->
			<footer id="footer">
				<ul class="icons">
					<li>
						<a href="#" class="icon-bluesky" aria-label="Bluesky">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
								<path d="M111.8 62.2C170.2 105.9 233 194.7 256 242.4c23-47.6 85.8-136.4 144.2-180.2c42.1-31.6 110.3-56 110.3 21.8c0 15.5-8.9 130.5-14.1 149.2C478.2 298 412 314.6 353.1 304.5c102.9 17.5 129.1 75.5 72.5 133.5c-107.4 110.2-154.3-27.6-166.3-62.9l0 0c-1.7-4.9-2.6-7.8-3.3-7.8s-1.6 3-3.3 7.8l0 0c-12 35.3-59 173.1-166.3 62.9c-56.5-58-30.4-116 72.5-133.5C100 314.6 33.8 298 15.7 233.1C10.4 214.4 1.5 99.4 1.5 83.9C1.5 6.1 69.7 30.5 111.8 62.2z"/>
							</svg>
							<span class="label">Bluesky</span>
						</a>
					</li>
					<li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
					<li><a href="#" class="icon fa-envelope"><span class="label">Email</span></a></li>
				</ul>
				<ul class="copyright">
					<li>&copy; Draoicht Studios.</li><li>Credits: <a href="http://html5up.net">HTML5 UP</a></li>
				</ul>
			</footer>

		<!-- Scripts -->
			<script src="assets/js/main.js"></script>

			<!-- AJAX form submission — stays on page, no Formspree redirect -->
			<script>
				var form = document.getElementById('signup-form');
				form.addEventListener('submit', function(e) {
					e.preventDefault();
					var data = new FormData(form);
					fetch('https://formspree.io/f/xojkejgb', {
						method: 'POST',
						body: data,
						headers: { 'Accept': 'application/json' }
					})
					.then(function(response) {
						if (response.ok) {
							form.style.display = 'none';
							document.getElementById('thanks-message').style.display = 'block';
						} else {
							alert('Oops! Something went wrong. Please try again.');
						}
					})
					.catch(function() {
						alert('Oops! Something went wrong. Please try again.');
					});
				});
			</script>
	</body>
</html>
